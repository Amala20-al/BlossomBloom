<!DOCTYPE html>
<html>
<head>
<title>SignUp</title>

<script>
function valForm() {

    if (document.SignUp.username.value.trim() === "") {
        alert("Enter Username");
        document.SignUp.username.focus();
        return false;
    }

    if (document.SignUp.password.value.trim() === "") {
        alert("Enter Password");
        document.SignUp.password.focus();
        return false;
    }

    if (document.SignUp.role.value === "") {
        alert("Select Role");
        document.SignUp.role.focus();
        return false;
    }

    return true;
}
</script>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffd6e8, #e0f7fa, #fff5d7);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#ffffffcc;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    width:380px;
    text-align:center;
}

h1{
    color:#c94f7c;
    margin-bottom:25px;
}

label{
    display:block;
    text-align:left;
    margin-bottom:6px;
    color:#555;
    font-weight:bold;
}

input[type="text"],
input[type="password"],
select{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

input[type="text"]:focus,
input[type="password"]:focus,
select:focus{
    border-color:#a8d8ea;
}

input[type="submit"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#f7a8b8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

input[type="submit"]:hover{
    background:#c94f7c;
    transform:scale(1.03);
}
</style>

</head>

<body>

<div class="container">

<h1>Sign Up</h1>

<form name="SignUp" method="post" action="signup" onsubmit="return valForm()">

<label for="username">Username</label>
<input type="text" id="username" name="username" placeholder="Enter Username"/>

<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="Enter Password"/>

<label for="role">Role</label>
<select name="role" id="role">
    <option value="">Select Role</option>
    <option value="admin">Admin</option>
    <option value="delivery_boy">Delivery Boy</option>
</select>

<input type="submit" value="Sign Up"/>

</form>

</div>

</body>
</html>
