<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<script>
function valForm() {
    if (document.SignIn.username.value == "") {
        alert("Enter Username");
        document.SignIn.username.focus();
        return false;
    }
    if (document.SignIn.password.value == "") {
        alert("Enter Password");
        document.SignIn.password.focus();
        return false;
    }
    return true;
}
</script>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffd6e8, #e0f7fa, #fff5d7);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#ffffffcc;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    width:350px;
    text-align:center;
}

h1{
    color:#c94f7c;
    margin-bottom:25px;
}

label{
    display:block;
    text-align:left;
    margin-bottom:6px;
    color:#555;
    font-weight:bold;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

input[type="text"]:focus,
input[type="password"]:focus{
    border-color:#a8d8ea;
}

input[type="submit"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#f7a8b8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

input[type="submit"]:hover{
    background:#c94f7c;
    transform:scale(1.03);
}

#errorMessage{
    color:red;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">
    <h1>Sign In</h1>

    <form name="SignIn" method="post" action="signin" onsubmit="return valForm()">

        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter Username" required/>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter Password" required/>

        <div id="errorMessage"></div><br>

        <input type="submit" value="Sign In"/>

    </form>
</div>

</body>
</html>
